server {
    listen 80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # 解决 HTMX 切页 / 静态资源合理缓存
    client_max_body_size 20m;

    # 隐藏 PHP 版本号
    server_tokens off;

    # 日志
    access_log /var/log/nginx/geoflow.access.log;
    error_log /var/log/nginx/geoflow.error.log warn;

    # 静态资源直接由 nginx 接管，绕过 PHP
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|map|webp)$ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Laravel 路由：所有非静态文件都交给 index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP 处理
    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_script_name;

        include fastcgi_params;

        # 采集 / 仪表盘查询可能慢一些
        fastcgi_read_timeout 300s;
        fastcgi_send_timeout 300s;

        # 不缓存动态响应
        fastcgi_buffering off;
    }

    # 隐藏敏感文件
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # FPM 状态页（仅本机诊断用，不暴露到公网）
    location ~ ^/(fpm-status|fpm-ping)$ {
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;     # docker 内网
        allow 192.168.0.0/16;
        deny all;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $fastcgi_script_name;
        fastcgi_pass app:9000;
    }
}
