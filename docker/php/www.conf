; PHP-FPM 进程池配置
; 与 docker/nginx/default.conf 反代配合，支撑本地 SAAS 调试使用

[www]
user = www-data
group = www-data

listen = 0.0.0.0:9000

; 进程模型
pm = dynamic
pm.max_children = 20          ; 单机最多 20 个 worker 进程（满足 dev/单租户调试）
pm.start_servers = 4          ; 启动时 4 个
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500         ; 处理 500 个请求后回收进程，防止内存泄漏

; 慢请求告警阈值
request_slowlog_timeout = 5s
slowlog = /var/log/php-fpm.slow.log

; 状态页
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; 关键：把错误打到 stderr，让 docker logs 能看到
catch_workers_output = yes
decorate_workers_output = no

clear_env = no

; PHP 设置
php_admin_value[memory_limit] = 256M
php_admin_value[upload_max_filesize] = 20M
php_admin_value[post_max_size] = 64M
php_admin_value[max_execution_time] = 300
